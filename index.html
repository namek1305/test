<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>A-Frame Game Final</title>
<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/aframe-physics-system@4.1.1/dist/aframe-physics-system.min.js"></script>
</head>
<body>

<a-scene physics="driver: ammo; gravity: -9.8">
<a-assets>
<img id="groundTex" crossorigin="anonymous" src="https://cdn.aframe.io/a-painter/images/floor.jpg">
<img id="skyTex" crossorigin="anonymous" src="https://cdn.aframe.io/360-image-gallery-boilerplate/img/sechelt.jpg">
<audio id="collectSound" crossorigin="anonymous" src="https://cdn.aframe.io/basic-guide/audio/backgroundnoise.wav"></audio>
</a-assets>

<a-sky src="#skyTex"></a-sky>
<a-plane src="#groundTex" rotation="-90 0 0" width="30" height="30" static-body></a-plane>

<a-entity light="type: ambient; intensity: 0.6"></a-entity>
<a-entity light="type: directional; intensity: 0.8" position="1 2 1"></a-entity>

<a-entity id="player" position="0 1.6 8">
<a-camera>
<a-cursor raycaster="objects: .clickable"></a-cursor>
</a-camera>
</a-entity>

<a-text id="scoreText" value="Score: 0" position="-1 2 -3" color="#FFF"></a-text>
<a-text id="gameOver" value="" position="-2 3 -4" color="red"></a-text>

<a-entity id="items">
<a-box class="collectible clickable" position="0 1 -3" color="red" kinematic-body
animation="property: position; to: 1 1 -3; dir: alternate; loop: true; dur: 1500"></a-box>

<a-sphere class="collectible clickable" position="2 1 -4" color="blue" kinematic-body
animation="property: position; to: 3 1 -4; dir: alternate; loop: true; dur: 1800"></a-sphere>

<a-cylinder class="collectible clickable" position="-2 1 -2" color="green" kinematic-body
animation="property: position; to: -3 1 -2; dir: alternate; loop: true; dur: 2000"></a-cylinder>
</a-entity>

</a-scene>

<script>
let score=0;
let gameOver=false;
const scoreText=document.querySelector('#scoreText');
const gameOverText=document.querySelector('#gameOver');
const sound=document.querySelector('#collectSound');

function endGame(){
if(gameOver)return;
gameOver=true;
gameOverText.setAttribute('value','YOU WIN! Score: '+score);
}

document.querySelectorAll('.collectible').forEach(el=>{
el.addEventListener('click',()=>{
if(gameOver)return;
score++;
scoreText.setAttribute('value','Score: '+score);
sound.play();
el.setAttribute('animation__scale','property: scale; to: 0 0 0; dur:200');
setTimeout(()=>el.remove(),200);
if(score>=3)endGame();
});
});
</script>

</body>
</html>
