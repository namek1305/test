<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>Лаб 6: Сбор монет (A-Frame VR + физика)</title>
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <!-- Физика (CANNON.js) -->
  <script src="https://cdn.jsdelivr.net/gh/n5ro/aframe-physics-system@v4.2.4/dist/aframe-physics-system.min.js"></script>
</head>
<body>
  <a-scene physics="driver: cannon; debug: false">
    <!-- Активы -->
    <a-assets>
      <!-- Текстура земли (изображение) -->
      <img id="ground-texture" src="https://raw.githubusercontent.com/aframevr/aframe/master/examples/assets/textures/terrain.png">
      <!-- 3D-модель из Blender (glTF — замените на свою экспортированную модель) -->
      <a-asset-item id="duck-model" src="https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/main/2.0/Duck/glTF/Duck.gltf"></a-asset-item>
      <!-- Аудио (звук сбора) -->
      <audio id="collect-sound" src="https://freesound.org/data/previews/276/276951_5123854-lq.mp3"></audio>
    </a-assets>

    <!-- Небо -->
    <a-sky color="#87CEEB"></a-sky>

    <!-- Земля (текстура + физика static) -->
    <a-plane 
      rotation="-90 0 0" 
      position="0 0 0" 
      width="50" height="50" 
      material="src: #ground-texture; repeat: 10 10" 
      body="type: static; shape: box">
    </a-plane>

    <!-- Свет -->
    <a-light type="ambient" color="#AAA"></a-light>
    <a-light type="directional" position="5 10 5" intensity="0.8"></a-light>

    <!-- Камера (с курсором для клика на ПК/VR) -->
    <a-camera position="0 1.6 8" wasd-controls="acceleration: 30">
      <a-cursor color="#FF0000" raycaster="objects: .coin"></a-cursor>
    </a-camera>

    <!-- Группа монет (потомки одного предка — трансформация наследуется) -->
    <a-entity id="coins-group" position="0 0 -5">
      <!-- 5 монет (с анимацией вращения) -->
      <a-entity class="coin" position="-4 2 0">
        <a-ring radius-inner="0.1" radius-outer="0.3" color="#FFD700" 
                body="type: static"
                animation="property: rotation; to: 0 360 0; dur: 1500; repeat: indefinite; easing: linear">
        </a-ring>
      </a-entity>
      <a-entity class="coin" position="-2 3 1">
        <a-ring radius-inner="0.1" radius-outer="0.3" color="#FFD700" 
                body="type: static"
                animation="property: rotation; to: 0 360 0; dur: 1500; repeat: indefinite; easing: linear">
        </a-ring>
      </a-entity>
      <a-entity class="coin" position="0 2 -1">
        <a-ring radius-inner="0.1" radius-outer="0.3" color="#FFD700" 
                body="type: static"
                animation="property: rotation; to: 0 360 0; dur: 1500; repeat: indefinite; easing: linear">
        </a-ring>
      </a-entity>
      <a-entity class="coin" position="2 3 0">
        <a-ring radius-inner="0.1" radius-outer="0.3" color="#FFD700" 
                body="type: static"
                animation="property: rotation; to: 0 360 0; dur: 1500; repeat: indefinite; easing: linear">
        </a-ring>
      </a-entity>
      <a-entity class="coin" position="4 2 2">
        <a-ring radius-inner="0.1" radius-outer="0.3" color="#FFD700" 
                body="type: static"
                animation="property: rotation; to: 0 360 0; dur: 1500; repeat: indefinite; easing: linear">
        </a-ring>
      </a-entity>
    </a-entity>

    <!-- Демонстрация физики: падающий куб (dynamic-body) -->
    <a-box position="6 8 -3" color="#FF00FF" 
           body="type: dynamic; mass: 2" 
           scale="0.5 0.5 0.5"></a-box>

    <!-- 3D-модель из Blender (потомок группы) -->
    <a-entity gltf-model="#duck-model" position="8 1 -8" scale="1.5 1.5 1.5" rotation="0 45 0"></a-entity>

    <!-- UI: счётчик и текст победы -->
    <a-text id="score-text" value="Счёт: 0 / 5" 
            position="-2 3 -4" scale="1.5 1.5 1.5" color="#FFFFFF" align="center"></a-text>
    <a-text id="win-text" value="ПОБЕДА! Вы собрали все монеты!" 
            position="0 4 -6" scale="2 2 2" color="#00FF00" align="center" 
            visible="false"></a-text>
  </a-scene>

  <script>
    let score = 0;
    const totalCoins = 5;
    const scoreText = document.getElementById('score-text');
    const winText = document.getElementById('win-text');
    const collectSound = document.getElementById('collect-sound');

    // Интерактивность + анимация по событию
    document.querySelectorAll('.coin').forEach(coin => {
      coin.addEventListener('click', function (evt) {
        // Анимация исчезновения (по событию click)
        this.setAttribute('animation', {
          property: 'scale',
          to: '0 0 0',
          dur: 300,
          easing: 'ease-out'
        });

        // Задержка перед удалением
        setTimeout(() => {
          if (this.parentNode) this.parentNode.removeChild(this);
        }, 300);

        // Звук
        collectSound.currentTime = 0;
        collectSound.play();

        // Счётчик
        score++;
        scoreText.setAttribute('value', `Счёт: ${score} / ${totalCoins}`);

        // Победа
        if (score >= totalCoins) {
          winText.setAttribute('visible', 'true');
          // Дополнительная анимация победы
          winText.setAttribute('animation', {
            property: 'scale',
            from: '0 0 0',
            to: '2 2 2',
            dur: 1000
          });
        }
      });
    });
  </script>
</body>
</html>
