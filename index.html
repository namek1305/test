<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Sanya Laba 6 Final</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-physics-system@v4.2.2/dist/aframe-physics-system.min.js"></script>

    <script>
      AFRAME.registerComponent('game-logic', {
        init: function () {
          this.score = 0;
          this.total = 3;
          this.scoreText = document.querySelector('#score');
          this.winPanel = document.querySelector('#win-panel');
          
          // Слушаем клики
          this.el.addEventListener('click', (e) => {
            if (e.detail.intersectedEl && e.detail.intersectedEl.classList.contains('target')) {
              this.collect(e.detail.intersectedEl);
            }
          });
        },
        collect: function (obj) {
          this.score++;
          this.scoreText.setAttribute('value', 'Score: ' + this.score);
          
          // Проигрываем встроенный звук (писк)
          const beep = new AudioContext();
          const o = beep.createOscillator();
          o.connect(beep.destination);
          o.start();
          o.stop(beep.currentTime + 0.1);

          obj.parentNode.removeChild(obj);

          if (this.score >= this.total) {
            this.winPanel.setAttribute('visible', 'true');
          }
        }
      });
    </script>
  </head>
  <body>
    <a-scene physics="debug: false" game-logic cursor="rayOrigin: mouse" raycaster="objects: .target" loading-screen="dotsColor: white; backgroundColor: black">
      
      <a-assets timeout="1000">
        </a-assets>

      <a-sky color="#242424"></a-sky>
      <a-plane static-body rotation="-90 0 0" width="100" height="100" color="#333"></a-plane>

      <a-camera position="0 1.6 0">
        <a-text id="score" value="Score: 0" position="-0.5 0.5 -1" color="gold" width="4"></a-text>
        
        <a-entity id="win-panel" visible="false" position="0 0 -1">
          <a-plane color="#111" width="1" height="0.6" opacity="0.9"></a-plane>
          <a-text value="WIN! Score: 3/3" align="center" color="lime" width="4"></a-text>
        </a-entity>
      </a-camera>

      <a-entity id="parent-container" position="0 0 -4">
        
        <a-sphere class="target" dynamic-body position="-2 5 0" radius="0.5" color="red"
                  animation="property: position; to: -2 5.5 0; dir: alternate; loop: true"></a-sphere>

        <a-box class="target" dynamic-body position="0 6 0" color="blue"
               animation__click="property: scale; from: 1 1 1; to: 1.2 1.2 1.2; startEvents: mouseenter; dur: 200"></a-box>

        <a-cone class="target" dynamic-body position="2 7 0" color="green" radius-bottom="0.5"></a-cone>

      </a-entity>

      <a-light type="ambient" intensity="0.6"></a-light>
      <a-light type="directional" position="1 2 1" intensity="0.5"></a-light>

    </a-scene>
  </body>
</html>
