<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Sanya's AR Game</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-physics-system@v4.2.2/dist/aframe-physics-system.min.js"></script>

    <script>
      // Регистрируем логику только когда AFRAME готов
      AFRAME.registerComponent('game-manager', {
        init: function () {
          this.score = 0;
          this.scoreText = document.querySelector('#score-val');
          
          // Слушаем клики по объектам с классом 'target'
          this.el.addEventListener('click', (e) => {
            if (e.detail.intersectedEl && e.detail.intersectedEl.classList.contains('target')) {
              this.collect(e.detail.intersectedEl);
            }
          });
        },
        collect: function (obj) {
          this.score++;
          this.scoreText.setAttribute('value', 'Score: ' + this.score);
          
          // Удаляем объект красиво (через анимацию или просто удаление)
          obj.parentNode.removeChild(obj);
          
          if (this.score >= 3) {
            document.querySelector('#win-msg').setAttribute('visible', 'true');
          }
        }
      });
    </script>
  </head>
  <body>
    <a-scene physics="debug: false" game-manager cursor="rayOrigin: mouse" raycaster="objects: .target">
      
      <a-assets>
        <img id="ground-img" src="https://cdn.aframe.io/a-painter/images/floor.jpg">
      </a-assets>

      <a-sky color="#222"></a-sky>
      <a-light type="ambient" intensity="0.7"></a-light>
      <a-light type="directional" position="1 2 1" intensity="0.5"></a-light>

      <a-plane static-body rotation="-90 0 0" width="50" height="50" src="#ground-img"></a-plane>

      <a-camera position="0 1.6 0">
        <a-text id="score-val" value="Score: 0" position="-0.8 0.6 -1" color="white" width="4"></a-text>
        <a-text id="win-msg" value="Laba Done! Result: 100%" visible="false" position="-0.8 0 -1" color="yellow" width="5"></a-text>
      </a-camera>

      <a-entity id="targets-container">
        <a-box class="target" dynamic-body position="-2 4 -5" color="cyan" 
               animation="property: rotation; to: 0 360 0; loop: true; dur: 4000">
        </a-box>

        <a-sphere class="target" dynamic-body position="0 5 -6" radius="0.7" color="magenta"
                  animation__hit="property: scale; to: 1.2 1.2 1.2; dur: 200; startEvents: mouseenter">
        </a-sphere>

        <a-cone class="target" dynamic-body position="2 6 -4" color="yellow" radius-bottom="0.5"></a-cone>
      </a-entity>

    </a-scene>
  </body>
</html>
