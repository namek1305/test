<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>AR&VR lab</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-physics-system@v4.2.2/dist/aframe-physics-system.min.js"></script>

    <script>
      // Компонент игры
      AFRAME.registerComponent('game-logic', {
        init: function () {
          this.score = 0;
          this.scoreText = document.querySelector('#score');
          this.winText = document.querySelector('#win-panel');
          
          this.el.addEventListener('click', (e) => {
            const target = e.detail.intersectedEl;
            if (target && target.classList.contains('clickable')) {
              this.score++;
              this.scoreText.setAttribute('value', 'Score: ' + this.score);
              
              // Прячем объект
              target.setAttribute('visible', 'false');
              target.classList.remove('clickable');

              // Звук без файла (бип через браузер)
              const a=new AudioContext(); const o=a.createOscillator(); o.connect(a.destination); o.start(); o.stop(a.currentTime+0.1);

              if (this.score >= 3) {
                this.winText.setAttribute('visible', 'true');
              }
            }
          });
        }
      });
    </script>
  </head>
  <body>
    <a-scene loading-screen="enabled: false" physics="debug: false" game-logic cursor="rayOrigin: mouse">
      
      <a-assets timeout="1"></a-assets>

      <a-sky color="#1a1a1a"></a-sky>
      <a-plane static-body rotation="-90 0 0" width="20" height="20" color="#2c3e50"></a-plane>

      <a-camera position="0 1.6 0">
        <a-text id="score" value="Score: 0" position="-0.7 0.7 -1" color="lime" width="4"></a-text>
        
        <a-entity id="win-panel" visible="false" position="0 0 -1.2">
          <a-plane color="black" width="1.5" height="0.8" opacity="0.9"></a-entity>
          <a-text value="WIN! LAB DONE" align="center" color="gold" width="5" position="0 0 0.01"></a-text>
        </a-entity>
      </a-camera>

      <a-entity id="targets" position="0 0 -4">
        
        <a-box class="clickable" static-body position="-1.5 1 0" color="red"
               animation="property: rotation; to: 0 360 0; loop: true; dur: 4000"></a-box>

        <a-sphere class="clickable" static-body position="0 1.5 0" radius="0.6" color="blue"
                  animation__h="property: scale; to: 1.2 1.2 1.2; startEvents: mouseenter; dur: 200"></a-sphere>

        <a-cone class="clickable" dynamic-body position="1.5 4 0" color="green" radius-bottom="0.5"></a-cone>

      </a-entity>

      <a-light type="ambient" intensity="0.7"></a-light>
      <a-light type="directional" position="1 3 2"></a-light>

    </a-scene>
  </body>
</html>
