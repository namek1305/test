<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>A-Frame Game Fixed</title>
<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-physics-system@v4.0.1/dist/aframe-physics-system.min.js"></script>
<script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>
<body>

<a-scene physics="gravity: -9.8">
<a-assets>
<img id="groundTex" crossorigin="anonymous" src="https://cdn.aframe.io/a-painter/images/floor.jpg">
<img id="skyTex" crossorigin="anonymous" src="https://cdn.aframe.io/360-image-gallery-boilerplate/img/sechelt.jpg">
<audio id="collectSound" src="https://cdn.aframe.io/basic-guide/audio/backgroundnoise.wav"></audio>
</a-assets>

<a-sky src="#skyTex"></a-sky>
<a-plane src="#groundTex" rotation="-90 0 0" width="50" height="50" static-body></a-plane>

<a-entity light="type: ambient; intensity: 0.5"></a-entity>
<a-entity light="type: directional; intensity: 1" position="1 1 0"></a-entity>

<a-entity id="player" position="0 1.6 5">
<a-camera>
<a-cursor raycaster="objects: .clickable"></a-cursor>
</a-camera>
</a-entity>

<a-text id="scoreText" value="Score: 0" position="-1 2 -3" color="#FFF"></a-text>
<a-text id="gameOver" value="" position="-2 3 -4" color="red"></a-text>

<a-entity>
<a-box class="collectible clickable" position="0 1 -5" color="red"></a-box>
<a-sphere class="collectible clickable" position="2 1 -6" color="blue"></a-sphere>
<a-cylinder class="collectible clickable" position="-2 1 -4" color="green"></a-cylinder>
</a-entity>

<a-box id="obstacle" position="0 1 -8" color="black"
animation="property: position; to: 3 1 -8; dir: alternate; loop: true; dur: 2000">
</a-box>

</a-scene>

<script>
let score=0;
let gameOver=false;
const scoreText=document.querySelector('#scoreText');
const gameOverText=document.querySelector('#gameOver');
const sound=document.querySelector('#collectSound');

function endGame(win){
if(gameOver)return;
gameOver=true;
if(win){
gameOverText.setAttribute('value','YOU WIN! Score: '+score);
}else{
gameOverText.setAttribute('value','GAME OVER! Score: '+score);
}
}

document.querySelectorAll('.collectible').forEach(el=>{
el.addEventListener('click',()=>{
if(gameOver)return;
score++;
scoreText.setAttribute('value','Score: '+score);
sound.play();
el.setAttribute('animation','property: scale; to: 0 0 0; dur:300');
setTimeout(()=>el.remove(),300);
if(score>=3)endGame(true);
});
});

const player=document.querySelector('#player');
const obstacle=document.querySelector('#obstacle');

function checkCollision(){
if(gameOver)return;
const p=player.object3D.position;
const o=obstacle.object3D.position;
const dist=Math.sqrt(
Math.pow(p.x-o.x,2)+
Math.pow(p.z-o.z,2)
);
if(dist<1.5)endGame(false);
requestAnimationFrame(checkCollision);
}
checkCollision();
</script>

<a-scene embedded arjs>
<a-marker preset="hiro">
<a-box position="0 0.5 0" color="yellow"
animation="property: rotation; to: 0 360 0; loop: true; dur: 3000">
</a-box>
</a-marker>
<a-entity camera></a-entity>
</a-scene>

</body>
</html>
