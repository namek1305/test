<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>AR&VR lab</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-physics-system@v4.2.2/dist/aframe-physics-system.min.js"></script>

    <script>
      AFRAME.registerComponent('game-logic', {
        init: function () {
          this.score = 0;
          this.total = 3;
          this.scoreText = document.querySelector('#score-val');
          this.victoryScreen = document.querySelector('#victory-msg');
          
          this.el.addEventListener('click', (e) => {
            // Проверяем, что кликнули именно по цели
            if (e.detail.intersectedEl && e.detail.intersectedEl.classList.contains('target')) {
              this.handlePoint(e.detail.intersectedEl);
            }
          });
        },
        handlePoint: function (obj) {
          this.score++;
          this.scoreText.setAttribute('value', 'Score: ' + this.score);
          
          // Эффект исчезновения
          obj.setAttribute('visible', 'false');
          obj.classList.remove('target'); // Чтобы нельзя было кликнуть дважды
          
          if (this.score >= this.total) {
            this.victoryScreen.setAttribute('visible', 'true');
          }
        }
      });
    </script>
  </head>
  <body>
    <a-scene 
      physics="debug: false" 
      game-logic 
      cursor="rayOrigin: mouse" 
      raycaster="objects: .target; far: 50; interval: 50"
      loading-screen="enabled: false">
      
      <a-assets timeout="500"></a-assets>

      <a-sky color="#121212"></a-sky>
      <a-plane static-body rotation="-90 0 0" width="100" height="100" color="#2c3e50"></a-plane>

      <a-camera position="0 1.6 0">
        <a-text id="score-val" value="Score: 0" position="-0.8 0.6 -1" color="#2ecc71" width="4"></a-text>
        
        <a-entity id="victory-msg" visible="false" position="0 0 -1.2">
          <a-plane color="#000" width="1.5" height="0.8" opacity="0.9"></a-plane>
          <a-text value="VICTORY!" align="center" position="0 0.2 0.01" color="#f1c40f" width="6"></a-text>
          <a-text value="Lab Completed" align="center" position="0 -0.1 0.01" color="#fff" width="3"></a-text>
        </a-entity>
      </a-camera>

      <a-entity id="targets-group" position="0 1 -5">
        
        <a-box class="target" static-body position="-2 1 0" color="#e74c3c"
               animation="property: rotation; to: 0 360 0; loop: true; dur: 4000"
               animation__mouseenter="property: scale; to: 1.1 1.1 1.1; startEvents: mouseenter; dur: 100"
               animation__mouseleave="property: scale; to: 1 1 1; startEvents: mouseleave; dur: 100">
        </a-box>

        <a-sphere class="target" static-body position="0 1.5 0" radius="0.7" color="#3498db"
                  animation="property: position; to: 0 1.8 0; dir: alternate; loop: true; dur: 2000">
        </a-sphere>

        <a-cone class="target" static-body position="2 1 0" color="#27ae60" radius-bottom="0.6"
                animation="property: rotation; to: 0 -360 0; loop: true; dur: 3000">
        </a-cone>

      </a-entity>

      <a-light type="ambient" intensity="0.8"></a-light>
      <a-light type="directional" position="1 4 1" intensity="0.6"></a-light>

    </a-scene>
  </body>
</html>
