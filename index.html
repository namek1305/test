<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Fixed A-Frame Game</title>
<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
<script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>
<body>

<a-scene>
<a-assets>
<img id="groundTex" crossorigin="anonymous" src="https://cdn.aframe.io/a-painter/images/floor.jpg">
<img id="skyTex" crossorigin="anonymous" src="https://cdn.aframe.io/360-image-gallery-boilerplate/img/sechelt.jpg">
<audio id="collectSound" crossorigin="anonymous" src="https://cdn.aframe.io/basic-guide/audio/backgroundnoise.wav"></audio>
</a-assets>

<a-sky src="#skyTex"></a-sky>
<a-plane src="#groundTex" rotation="-90 0 0" width="30" height="30"></a-plane>

<a-entity light="type: ambient; intensity: 0.6"></a-entity>
<a-entity light="type: directional; intensity: 0.8" position="1 2 1"></a-entity>

<a-entity id="player" position="0 1.6 8">
<a-camera>
<a-cursor raycaster="objects: .clickable"></a-cursor>
</a-camera>
</a-entity>

<a-text id="scoreText" value="Score: 0" position="-1 2 -3" color="#FFF"></a-text>
<a-text id="gameOver" value="" position="-2 3 -4" color="red"></a-text>

<a-entity id="items">
<a-box class="collectible clickable" position="0 1 -3" color="red"></a-box>
<a-sphere class="collectible clickable" position="2 1 -4" color="blue"></a-sphere>
<a-cylinder class="collectible clickable" position="-2 1 -2" color="green"></a-cylinder>
</a-entity>

<a-box id="obstacle" position="0 1 -10" color="black"
animation="property: position; to: 3 1 -10; dir: alternate; loop: true; dur: 2000">
</a-box>

</a-scene>

<script>
let score=0;
let gameOver=false;
const scoreText=document.querySelector('#scoreText');
const gameOverText=document.querySelector('#gameOver');
const sound=document.querySelector('#collectSound');
const player=document.querySelector('#player');
const obstacle=document.querySelector('#obstacle');

function endGame(win){
if(gameOver)return;
gameOver=true;
if(win){
gameOverText.setAttribute('value','YOU WIN! Score: '+score);
}else{
gameOverText.setAttribute('value','GAME OVER! Score: '+score);
}
}

document.querySelectorAll('.collectible').forEach(el=>{
el.addEventListener('click',()=>{
if(gameOver)return;
score++;
scoreText.setAttribute('value','Score: '+score);
sound.play();
el.setAttribute('animation','property: scale; to: 0 0 0; dur:200');
setTimeout(()=>el.remove(),200);
if(score>=3)endGame(true);
});
});

function checkCollision(){
if(gameOver)return;
const p=player.object3D.position;
const o=obstacle.object3D.position;
const dx=p.x-o.x;
const dz=p.z-o.z;
const dist=Math.sqrt(dx*dx+dz*dz);
if(dist<1.2)endGame(false);
requestAnimationFrame(checkCollision);
}

setTimeout(checkCollision,1000);
</script>

</body>
</html>
