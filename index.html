<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>A-Frame Mini-Game</title>
    <script src="https://aframe.io/releases/1.4.0/script.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-physics-system@v4.2.2/dist/aframe-physics-system.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.3.2/dist/aframe-environment-component.min.js"></script>
    
    <script>
      AFRAME.registerComponent('game-logic', {
        init: function () {
          this.score = 0;
          this.scoreText = document.querySelector('#score');
          this.el.addEventListener('click', (evt) => {
            if (evt.detail.intersectedEl.classList.contains('collectible')) {
              this.collect(evt.detail.intersectedEl);
            }
          });
        },
        collect: function (obj) {
          this.score++;
          this.scoreText.setAttribute('value', 'Score: ' + this.score);
          obj.parentNode.removeChild(obj);
          document.querySelector('#collect-sound').components.sound.playSound();
          
          if (this.score >= 5) {
            document.querySelector('#win-text').setAttribute('visible', 'true');
          }
        }
      });
    </script>
  </head>
  <body>
    <a-scene physics="debug: false" game-logic cursor="rayOrigin: mouse">
      
      <a-assets>
        <img id="groundTex" src="https://cdn.aframe.io/a-painter/images/floor.jpg">
        <audio id="bgMusic" src="https://cdn.aframe.io/basic-guide/audio/backgroundnoise.wav" preload="auto"></audio>
        <audio id="collect-sound" src="https://cdn.aframe.io/360-image-gallery-boilerplate/audio/click.ogg"></audio>
        <a-asset-item id="trophy-model" src="https://cdn.aframe.io/test-models/models/glTF-2.0/virtualcity/VC.gltf"></a-asset-item>
      </a-assets>

      <a-sky src="https://cdn.aframe.io/360-image-gallery-boilerplate/img/sechelt.jpg"></a-sky>
      <a-entity light="type: ambient; intensity: 0.5"></a-entity>
      <a-entity light="type: directional; intensity: 0.8" position="-1 1 0"></a-entity>

      <a-plane static-body rotation="-90 0 0" width="20" height="20" src="#groundTex" repeat="10 10"></a-plane>

      <a-entity id="rig" position="0 1.6 5">
        <a-camera id="camera">
          <a-text id="score" value="Score: 0" position="-0.5 0.8 -1" color="black" width="3"></a-text>
          <a-text id="win-text" value="YOU WIN!" visible="false" position="-0.5 0 -1" color="red" width="6"></a-text>
        </a-camera>
      </a-entity>

      <a-entity id="targets" position="0 0 0">
        <a-box class="collectible" dynamic-body position="-2 3 -3" color="gold" 
               animation="property: rotation; to: 0 360 0; loop: true; dur: 3000">
        </a-box>
        
        <a-sphere class="collectible" dynamic-body position="0 5 -4" radius="0.5" color="tomato"
                  animation__hover="property: position; to: 0 5.5 -4; dir: alternate; loop: true; dur: 1000">
        </a-sphere>

        <a-entity class="collectible" gltf-model="#trophy-model" scale="0.01 0.01 0.01" position="2 1 -3" static-body></a-entity>
      </a-entity>

      <a-entity sound="src: #bgMusic; autoplay: true; loop: true; volume: 0.3"></a-entity>
      
    </a-scene>
  </body>
</html>
